<script>
// ─── STATE ───────────────────────────────────────────────────
let STATE = {
  token: null, connected: false, loading: false,
  selectedTicker: "SPY", selectedExp: null, expirations: [],
  quote: null, gexStrikes: [], pressureScore: 50,
  totalCallPrem: 0, totalPutPrem: 0, netGEX: 0,
  gammaFlip: null, callWall: null, putWall: null, dpLevels: [],
  watchlistData: {}, activeTab: 0, refreshTimer: null,
  signals: [], scoutResults: [], scoutLoading: false,
  signalExpanded: {},
};

const WATCHLIST = ["SPY","QQQ","AAPL","MSFT","VZ","WMT","NVDA","PLTR","META","COP","JEPI"];

const TICKER_META = {
  SPY:  {role:"Market Barometer",  tier:"MACRO",  note:"Overall GEX regime"},
  QQQ:  {role:"Tech Barometer",    tier:"MACRO",  note:"Tech sector health"},

  MSFT: {role:"Core Income",       tier:"TIER 1", note:"Blue chip, consistent premiums"},
  VZ:   {role:"Income + Dividend", tier:"TIER 1", note:"Range-bound, ~6% yield"},
  WMT:  {role:"Defensive Income",  tier:"TIER 1", note:"Stable, reliable premiums"},
  NVDA: {role:"Growth + Income",   tier:"TIER 2", note:"Fat premiums, AI tailwind"},
  PLTR: {role:"Growth + Income",   tier:"TIER 2", note:"Heavy institutional flow"},
  META: {role:"Growth + Income",   tier:"TIER 2", note:"Strong fundamentals, liquid"},
  COP:  {role:"Energy Diversifier",tier:"TIER 3", note:"Energy + dividend ~4.8%"},
  JEPI: {role:"Base Income ETF",   tier:"TIER 3", note:"Monthly income, 8%+ yield"},
};

const TIER_COLORS = {"MACRO":"#f5c518","TIER 1":"#00e5a0","TIER 2":"#38bdf8","TIER 3":"#a78bfa"};

// ─── API ──────────────────────────────────────────────────────
const WORKER = "https://shadowtape-proxy.shadowtape-account.workers.dev";

async function tFetch(path) {
  const url = WORKER + "?token=" + encodeURIComponent(STATE.token) + "&path=" + encodeURIComponent(path);
  const res = await fetch(url, { signal: AbortSignal.timeout(14000) });
  if (res.status === 401 || res.status === 403) throw new Error("Token rejected — use PRODUCTION token from Tradier Settings → API Access.");
  if (!res.ok) throw new Error("API error " + res.status);
  return res.json();
}

async function apiQuote(sym) {
  const d = await tFetch("/markets/quotes?symbols=" + sym + "&greeks=true");
  const q = d && d.quotes && d.quotes.quote;
  if (!q) throw new Error("No quote for " + sym);
  return q;
}

async function apiExpirations(sym) {
  const d = await tFetch("/markets/options/expirations?symbol=" + sym + "&includeAllRoots=false");
  const e = d && d.expirations && d.expirations.date;
  if (!e) return [];
  return Array.isArray(e) ? e : [e];
}

async function apiChain(sym, exp) {
  const d = await tFetch("/markets/options/chains?symbol=" + sym + "&expiration=" + exp + "&greeks=true");
  const o = d && d.options && d.options.option;
  if (!o) return [];
  return Array.isArray(o) ? o : [o];
}

// ─── ANALYTICS ───────────────────────────────────────────────
function computeGEX(chain, spot) {
  const byStrike = {};
  chain.forEach(opt => {
    if (!opt.greeks || !opt.greeks.gamma || !opt.open_interest) return;
    const s = opt.strike;
    if (!byStrike[s]) byStrike[s] = {strike:s,callGEX:0,putGEX:0,callOI:0,putOI:0,callVol:0,putVol:0,callPrem:0,putPrem:0,callBid:0,putBid:0};
    const gex = opt.greeks.gamma * opt.open_interest * 100 * spot * spot;
    const vol = opt.volume || 0;
    const oi = opt.open_interest || 0;
    const prem = vol * (opt.last || opt.bid || 0) * 100;
    if (opt.option_type === "call") {
      byStrike[s].callGEX += gex; byStrike[s].callOI += oi;
      byStrike[s].callVol += vol; byStrike[s].callPrem += prem;
      byStrike[s].callBid = Math.max(byStrike[s].callBid, opt.bid || 0);
    } else {
      byStrike[s].putGEX += gex; byStrike[s].putOI += oi;
      byStrike[s].putVol += vol; byStrike[s].putPrem += prem;
      byStrike[s].putBid = Math.max(byStrike[s].putBid, opt.bid || 0);
    }
  });
  return Object.values(byStrike).sort((a,b) => a.strike - b.strike);
}

function calcGammaFlip(strikes, spot) {
  const near = [...strikes].sort((a,b) => Math.abs(a.strike-spot) - Math.abs(b.strike-spot));
  for (let i = 0; i < near.length-1; i++) {
    const n1 = near[i].callGEX - near[i].putGEX;
    const n2 = near[i+1].callGEX - near[i+1].putGEX;
    if (Math.sign(n1) !== Math.sign(n2)) return +((near[i].strike + near[i+1].strike)/2).toFixed(2);
  }
  return null;
}

function calcCallWall(strikes, spot) {
  const above = strikes.filter(s => s.strike >= spot);
  return above.length ? above.reduce((m,s) => s.callGEX > m.callGEX ? s : m, above[0]) : null;
}

function calcPutWall(strikes, spot) {
  const below = strikes.filter(s => s.strike <= spot);
  return below.length ? below.reduce((m,s) => s.putGEX > m.putGEX ? s : m, below[0]) : null;
}

function calcNetGEX(strikes) {
  return strikes.reduce((sum,s) => sum + s.callGEX - s.putGEX, 0);
}

function calcPressureScore(strikes, spot, cp, pp) {
  let score = 50;
  const total = cp + pp;
  if (total > 0) score += (cp/total - 0.5) * 70;
  const ng = calcNetGEX(strikes);
  score += Math.tanh(ng/1e10) * 12;
  const flip = calcGammaFlip(strikes, spot);
  if (flip) score += spot > flip ? 6 : -6;
  const cVOI = strikes.reduce((s,x)=>s+x.callVol,0) / (strikes.reduce((s,x)=>s+x.callOI,0)+1);
  const pVOI = strikes.reduce((s,x)=>s+x.putVol,0) / (strikes.reduce((s,x)=>s+x.putOI,0)+1);
  score += cVOI - pVOI > 0 ? 8 : -8;
  return Math.min(100, Math.max(0, Math.round(score)));
}

function calcDPLevels(strikes, spot) {
  return [...strikes]
    .map(s => ({...s, totalOI: s.callOI+s.putOI, totalPrem: s.callPrem+s.putPrem}))
    .sort((a,b) => b.totalOI - a.totalOI).slice(0,6)
    .map(s => ({price:s.strike, totalOI:s.totalOI, totalPrem:s.totalPrem,
      sentiment: s.strike <= spot ? "support" : "resistance",
      note: s.totalOI > 50000 ? "HIGH CONVICTION" : "MODERATE"}));
}

// ─── BLUE BAR DETECTOR ───────────────────────────────────────
function detectBlueBar(ticker, strikes, spot, quote, gflip) {
  // Three conditions must ALL align:
  // 1. Call premium spike: weighted V/OI > 1.5 on calls
  // 2. Price not extended: change_percentage within ±1.5%
  // 3. Positive GEX (above gamma flip = bonus, not hard requirement)

  const callVol = strikes.reduce((s,x)=>s+x.callVol,0);
  const callOI  = strikes.reduce((s,x)=>s+x.callOI,0);
  const putVol  = strikes.reduce((s,x)=>s+x.putVol,0);
  const putOI   = strikes.reduce((s,x)=>s+x.putOI,0);
  const cVOI = callOI > 0 ? callVol/callOI : 0;
  const pVOI = putOI  > 0 ? putVol/putOI   : 0;
  const ng = calcNetGEX(strikes);
  const chg = Math.abs(parseFloat(quote.change_percentage) || 0);
  const cp = strikes.reduce((s,x)=>s+x.callPrem,0);
  const pp = strikes.reduce((s,x)=>s+x.putPrem,0);
  const cpRatio = pp > 0 ? cp/pp : 1;

  const cond1 = cVOI > 1.5;                          // Call flow spike
  const cond2 = chg <= 1.5;                           // Price not extended (loosened from 0.8%)
  const cond3 = ng > 0;                               // Positive GEX (gamma flip is advisory, not hard block)
  const aboveFlip = gflip && spot > gflip;            // Bonus: above gamma flip (shown in detail)

  // Strength: cond1+cond3 are primary (40pts each), cond2 secondary (20pts), flip bonus (10pts)
  const strength = (cond1 ? 40 : 0) + (cond2 ? 20 : 0) + (cond3 ? 40 : 0) + (aboveFlip ? 10 : 0);
  const fired = cond1 && cond2 && cond3;

  // Find hottest call strike (highest V/OI above spot)
  const hotStrikes = strikes
    .filter(s => s.strike > spot && s.callOI > 0)
    .map(s => ({...s, cVOI: s.callVol/s.callOI}))
    .sort((a,b) => b.cVOI - a.cVOI);
  const hotStrike = hotStrikes[0] || null;

  // Suggested entry: current price, target: call wall or hot strike
  const cwall = calcCallWall(strikes, spot);
  const pwall = calcPutWall(strikes, spot);
  const target = cwall ? cwall.strike : (hotStrike ? hotStrike.strike : null);
  const support = pwall ? pwall.strike : (gflip || null);

  // Options angle: sell put below put wall, buy call near hot strike
  const putStrike = pwall ? Math.floor(pwall.strike * 0.995 / (spot > 100 ? 5 : 1)) * (spot > 100 ? 5 : 1) : null;

  return {
    ticker, fired, strength, cond1, cond2, cond3, aboveFlip,
    cVOI: +cVOI.toFixed(2), pVOI: +pVOI.toFixed(2),
    cpRatio: +cpRatio.toFixed(2),
    callPrem: cp, putPrem: pp,
    netGEX: ng, gammaFlip: gflip, spot,
    hotStrike: hotStrike ? hotStrike.strike : null,
    hotVOI: hotStrike ? +hotStrike.cVOI.toFixed(2) : null,
    target, support, putStrike,
    chg: parseFloat(quote.change_percentage) || 0,
    quote,
  };
}

// ─── SCOUT SCORING ───────────────────────────────────────────
async function runScout() {
  if (!STATE.connected) return;
  STATE.scoutLoading = true;
  renderScout();

  // Expanded to 65 tickers across large cap, mid cap, and lower-priced opportunities
  const tickers = [
    // Mega cap / Index
    "SPY","QQQ","AAPL","MSFT","AMZN","GOOGL","NVDA","META","TSLA","AVGO",
    // Financials
    "JPM","GS","BAC","C","MS","WFC","BRK.B",
    // Tech / Growth
    "AMD","ARM","MU","SMCI","ORCL","CRM","UBER","NFLX","DIS",
    // Institutional flow favorites
    "PLTR","MSTR","COIN","HOOD","SOFI",
    // Energy / Commodities
    "XOM","COP","CVX","OXY",
    // Defensive / Income
    "VZ","WMT","T","KO","PFE","JEPI","JEPQ",
    // Lower priced high-opportunity (under ~$50)
    "F","AAL","CCL","SNAP","RIVN","LCID","NIO","XPEV","GRAB","NU",
    "VALE","ITUB","PBR","GOLD","AG",
    // Mid cap with good options flow
    "RBLX","DKNG","PENN","SQ","SHOP","ABNB","LYFT","ROKU","IONQ",
  ];
  const results = [];

  for (const t of tickers) {
    try {
      const q = await apiQuote(t);
      const spot = parseFloat(q.last);
      const exps = await apiExpirations(t);
      if (!exps.length) continue;
      const chain = await apiChain(t, exps[0]);
      const strikes = computeGEX(chain, spot);
      const cp = strikes.reduce((s,x)=>s+x.callPrem,0);
      const pp = strikes.reduce((s,x)=>s+x.putPrem,0);
      const ng = calcNetGEX(strikes);
      const gflip = calcGammaFlip(strikes, spot);
      const ps = calcPressureScore(strikes, spot, cp, pp);
      const callVol = strikes.reduce((s,x)=>s+x.callVol,0);
      const callOI  = strikes.reduce((s,x)=>s+x.callOI,0);
      const putVol  = strikes.reduce((s,x)=>s+x.putVol,0);
      const putOI   = strikes.reduce((s,x)=>s+x.putOI,0);
      const cVOI = callOI > 0 ? callVol/callOI : 0;

      // Scout score components (each 0-25, total 100)
      const cwall = calcCallWall(strikes, spot);
      const pwall = calcPutWall(strikes, spot);

      // 1. Liquidity: based on bid spread proxy (OI > 10k = liquid)
      const totalOI = callOI + putOI;
      const liqScore = Math.min(25, (totalOI / 5000) * 25);

      // 2. GEX Structure: positive GEX + above gamma flip
      const gexScore = (ng > 0 ? 15 : 0) + (gflip && spot > gflip ? 10 : 0);

      // 3. Premium quality: C/P ratio + total premium volume
      const premScore = Math.min(25, ((cp+pp)/500000) * 15 + (cp > pp ? 10 : 0));

      // 4. Flow activity: call V/OI + pressure score component
      const flowScore = Math.min(25, cVOI * 10 + (ps > 55 ? 10 : ps > 42 ? 5 : 0));

      const totalScore = Math.round(liqScore + gexScore + premScore + flowScore);

      // Best strategy recommendation
      let strategy = "OBSERVE";
      let stratColor = "#bdd4e8";
      if (totalScore >= 70 && ng > 0 && ps >= 60) { strategy = "SELL PUTS"; stratColor = "#00e5a0"; }
      else if (totalScore >= 60 && ps >= 55) { strategy = "COVERED CALLS"; stratColor = "#38bdf8"; }
      else if (totalScore >= 50) { strategy = "MONITOR"; stratColor = "#f5c518"; }

      const bb = detectBlueBar(t, strikes, spot, q, gflip);

      const priceTier = spot < 20 ? "MICRO" : spot < 50 ? "LOW" : spot < 200 ? "MID" : "HIGH";
      results.push({
        ticker: t, score: totalScore, ps, ng, gflip, spot, priceTier,
        liqScore: Math.round(liqScore), gexScore, premScore: Math.round(premScore),
        flowScore: Math.round(flowScore), strategy, stratColor,
        cVOI: +cVOI.toFixed(2), cp, pp, totalOI,
        blueBar: bb.fired, bbStrength: bb.strength,
        chg: parseFloat(q.change_percentage) || 0,
        callWall: cwall ? cwall.strike : null,
        putWall: pwall ? pwall.strike : null,
      });

      STATE.scoutResults = [...results].sort((a,b) => b.score - a.score);
      renderScout();
      await new Promise(r => setTimeout(r, 120)); // Rate limit
    } catch(_) {}
  }

  STATE.scoutLoading = false;
  renderScout();
}

// ─── SIGNALS SCAN ────────────────────────────────────────────
async function runSignalsScan() {
  if (!STATE.connected) return;
  const signals = [];
  const btn = document.getElementById('signals-scan-btn');
  if (btn) { btn.disabled = true; btn.textContent = "SCANNING..."; }

  const scanTickers = WATCHLIST.filter(t => t !== "SPY" && t !== "QQQ" && t !== "JEPI");

  for (const ticker of scanTickers) {
    try {
      const q = await apiQuote(ticker);
      const spot = parseFloat(q.last);
      const exps = await apiExpirations(ticker);
      if (!exps.length) continue;
      const chain = await apiChain(ticker, exps[0]);
      const strikes = computeGEX(chain, spot);
      const cp = strikes.reduce((s,x)=>s+x.callPrem,0);
      const pp = strikes.reduce((s,x)=>s+x.putPrem,0);
      const gflip = calcGammaFlip(strikes, spot);
      const ps = calcPressureScore(strikes, spot, cp, pp);
      const bb = detectBlueBar(ticker, strikes, spot, q, gflip);
      bb.pressureScore = ps;
      signals.push(bb);
      await new Promise(r => setTimeout(r, 100));
    } catch(_) {}
  }

  STATE.signals = signals.sort((a,b) => b.strength - a.strength);
  if (btn) { btn.disabled = false; btn.textContent = "↺ RESCAN ALL"; }
  renderSignals();
}

// ─── CONNECT ─────────────────────────────────────────────────
async function connectWithToken(tok) {
  STATE.token = tok;
  const q = await apiQuote("SPY");
  if (!q||!q.last) throw new Error("No data returned — confirm token is PRODUCTION");
  STATE.connected = true;
  localStorage.setItem('shadowtape_token', tok);
  document.getElementById('token-panel').style.display = 'none';
  document.getElementById('conn-status').innerHTML = '<span class="dot"></span> &nbsp;CONNECTED · TRADIER PRODUCTION';
  document.getElementById('conn-status').style.color = '#00e5a0';
  document.getElementById('refresh-btn').style.display = 'inline-block';
  document.getElementById('forget-btn').style.display = 'inline-block';
  setStatus("");
  await loadData("SPY", null);
  loadWatchlistQuotes();
  STATE.refreshTimer = setInterval(() => loadData(STATE.selectedTicker, STATE.selectedExp), 60000);
}

async function handleConnect() {
  const tok = document.getElementById('token-input').value.trim();
  if (!tok) { setStatus("⚠ Paste your Tradier Production token first"); return; }
  setStatus("⏳ Connecting...", "#38bdf8");
  document.querySelector('button[onclick="handleConnect()"]').textContent = "CONNECTING...";
  try {
    await connectWithToken(tok);
  } catch(e) {
    STATE.token = null;
    const msg = e.message||"";
    if (msg.includes("Failed to fetch")||msg.includes("Load failed")) {
      setStatus("⚠ Network error — try Chrome. Check internet connection.");
    } else if (msg.includes("401")||msg.includes("403")) {
      setStatus("⚠ Token rejected — use PRODUCTION token from Tradier Settings → API Access.");
    } else { setStatus("⚠ "+msg); }
    document.querySelector('button[onclick="handleConnect()"]').textContent = "CONNECT →";
  }
}

function forgetToken() {
  localStorage.removeItem('shadowtape_token');
  location.reload();
}

async function refreshData() {
  if (!STATE.connected) return;
  await loadData(STATE.selectedTicker, STATE.selectedExp);
}

// ─── DATA LOADING ─────────────────────────────────────────────
async function loadData(ticker, exp) {
  if (!STATE.token) return;
  STATE.loading = true;
  document.getElementById('refresh-btn').textContent = "LOADING...";
  document.getElementById('error-banner').style.display = 'none';
  try {
    STATE.selectedTicker = ticker;
    const q = await apiQuote(ticker);
    STATE.quote = q;
    const spot = parseFloat(q.last);
    if (!STATE.expirations.length || STATE.selectedTicker !== ticker) {
      STATE.expirations = await apiExpirations(ticker);
    }
    const useExp = exp || STATE.expirations[0];
    STATE.selectedExp = useExp;
    const chain = await apiChain(ticker, useExp);
    const strikes = computeGEX(chain, spot);
    STATE.gexStrikes = strikes;
    const cp = strikes.reduce((s,x)=>s+x.callPrem,0);
    const pp = strikes.reduce((s,x)=>s+x.putPrem,0);
    STATE.totalCallPrem = cp; STATE.totalPutPrem = pp;
    STATE.gammaFlip = calcGammaFlip(strikes, spot);
    STATE.callWall = calcCallWall(strikes, spot);
    STATE.putWall = calcPutWall(strikes, spot);
    STATE.netGEX = calcNetGEX(strikes);
    STATE.pressureScore = calcPressureScore(strikes, spot, cp, pp);
    STATE.dpLevels = calcDPLevels(strikes, spot);
    renderAll();
  } catch(e) {
    const eb = document.getElementById('error-banner');
    eb.style.display = 'block'; eb.textContent = "⚠ "+e.message;
  } finally {
    STATE.loading = false;
    document.getElementById('refresh-btn').textContent = "↺ REFRESH";
  }
}

async function loadWatchlistQuotes() {

  }
}

// ─── RENDER VOLUME/OI ─────────────────────────────────────────
function renderVolumeOI() {
  const el=document.getElementById('tab-2');
  const spot=STATE.quote?parseFloat(STATE.quote.last):0;
  const rows=STATE.gexStrikes.filter(s=>spot&&Math.abs(s.strike-spot)/spot<0.06).sort((a,b)=>b.callVol+b.putVol-a.callVol-a.putVol).slice(0,20);
  let rowsHtml=rows.length?rows.map(s=>{
    const cVOI=s.callOI>0?(s.callVol/s.callOI).toFixed(2):"—";
    const pVOI=s.putOI>0?(s.putVol/s.putOI).toFixed(2):"—";
    const atm=spot&&Math.abs(s.strike-spot)/spot<0.005;
    const bias=s.callVol>s.putVol?"CALL":s.putVol>s.callVol?"PUT":"FLAT";
    const bc=bias==="CALL"?"#00e5a0":bias==="PUT"?"#e8394a":"#8db4d0";
    return `<div style="display:grid;grid-template-columns:60px 65px 65px 55px 65px 65px 55px 65px;gap:4px;padding:5px 10px;border-bottom:1px solid #1a2a3a;font-size:10.5px;background:${atm?'rgba(245,197,24,0.04)':'transparent'};border-left:${atm?'2px solid #f5c518':'2px solid transparent'}">
      <span style="color:${atm?'#f5c518':'#bdd4e8'};font-weight:${atm?700:400}">${s.strike}</span>
      <span style="color:#aabbd8">${s.callVol.toLocaleString()}</span><span style="color:#aacde0">${s.callOI.toLocaleString()}</span>
      <span style="color:${cVOI!=="—"&&parseFloat(cVOI)>1?'#f5c518':'#8db4d0'};font-weight:${cVOI!=="—"&&parseFloat(cVOI)>1?700:400}">${cVOI}</span>
      <span style="color:#aabbd8">${s.putVol.toLocaleString()}</span><span style="color:#aacde0">${s.putOI.toLocaleString()}</span>
      <span style="color:${pVOI!=="—"&&parseFloat(pVOI)>1?'#f5c518':'#8db4d0'};font-weight:${pVOI!=="—"&&parseFloat(pVOI)>1?700:400}">${pVOI}</span>
      <span style="color:${bc};font-weight:700;font-size:9.5px">${bias}</span>
    </div>`;
  }).join(''):`<div style="padding:24px;color:#8db4d0;font-size:11px">Connect token to load data.</div>`;
  el.innerHTML=`<div style="background:#080f1d;border:1px solid #0f1c30;border-radius:5px">
    <div style="padding:10px 14px;border-bottom:1px solid #0f1c30;font-size:10px;color:#8db4d0;font-weight:700;letter-spacing:0.12em;display:flex;justify-content:space-between">
      <span>◆ VOLUME / OI — ${STATE.selectedTicker}</span><span style="color:#7a9fc0">V/OI &gt;1.0 = new position</span>
    </div>
    <div style="display:grid;grid-template-columns:60px 65px 65px 55px 65px 65px 55px 65px;gap:4px;padding:5px 10px;font-size:8.5px;color:#7a9fc0;border-bottom:1px solid #0f1c30">
      <span>STRIKE</span><span>C-VOL</span><span>C-OI</span><span>C-V/OI</span><span>P-VOL</span><span>P-OI</span><span>P-V/OI</span><span>BIAS</span>
    </div>${rowsHtml}</div>`;
}

            <div><div style="font-size:9px;color:#8db4d0;letter-spacing:0.1em">${k.label}</div><div style="font-size:9px;color:#aacde0;margin-top:1px">${k.desc}</div></div>

    const c1col = sig.cond1 ? "#00e5a0" : "#e8394a";

            <span style="font-size:11px;color:${chgCol}">${sig.chg>=0?'▲':'▼'}${Math.abs(sig.chg).toFixed(2)}%</span>
            <span style="font-size:11px;color:#bdd4e8">$${sig.spot.toFixed(2)}</span>

          <div style="font-size:9.5px;color:#aacde0;margin-top:3px">
            ${isFired?`<span style="color:#38bdf8">Institutions quietly positioning — pressure loading before move</span>`

          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:800;color:${scCol}">${sc}</div>
            <div style="font-size:8px;color:#8db4d0">PRESSURE</div>
          </div>
          <span id="arr-${id}" style="color:#8db4d0;font-size:10px">${expanded?'▲':'▼'}</span>

      </div>

            <div style="font-size:10px;font-weight:700;color:${c1col}">${sig.cond1?'✓ CALL FLOW SPIKE':'✗ CALL FLOW WEAK'}</div>
            <div style="font-size:9px;color:#aacde0;margin-top:2px">Call V/OI: ${sig.cVOI} ${sig.cond1?'(>1.5 ✓)':'(need >1.5)'}</div>

            Positive GEX above gamma flip means dealers will stabilize any dip.<br>
            ${sig.putStrike?`<span style="color:#00e5a0">Sell put at $${sig.putStrike} — below put wall, GEX support underneath.</span>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:9.5px">
            <div style="background:#0b1424;padding:8px;border-radius:3px"><div style="color:#8db4d0;margin-bottom:2px">ENTRY ZONE</div><div style="color:#f5c518;font-weight:700">Near $${sig.spot.toFixed(2)}</div><div style="color:#aacde0;font-size:8.5px">Current price</div></div>
            <div style="background:#0b1424;padding:8px;border-radius:3px"><div style="color:#8db4d0;margin-bottom:2px">TARGET</div><div style="color:#00e5a0;font-weight:700">${sig.target?"$"+sig.target:"Call Wall"}</div><div style="color:#aacde0;font-size:8.5px">Call wall resistance</div></div>
            <div style="background:#0b1424;padding:8px;border-radius:3px"><div style="color:#8db4d0;margin-bottom:2px">INVALIDATION</div><div style="color:#e8394a;font-weight:700">${sig.gammaFlip?"Below $"+sig.gammaFlip:"Below gamma flip"}</div><div style="color:#aacde0;font-size:8.5px">GEX regime flips</div></div>
          </div>
        </div>`
        :`<div style="background:#0b1424;border-radius:4px;padding:10px;font-size:9.5px;color:#aacde0">

        </div>`}
      </div>
    </div>`;
  };

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:14px;font-weight:800;color:#dde8f5;letter-spacing:0.1em">🔵 BLUE BAR SIGNAL SCANNER</div>

      inactive.forEach(s => {
        const scCol = scoreColor(s.pressureScore||50);
        html += `<div style="background:#080f1d;border:1px solid #0f1c30;border-radius:4px;padding:10px;display:flex;justify-content:space-between;align-items:center">
          <div><span style="font-size:13px;font-weight:700;color:#aacde0">${s.ticker}</span>
          <div style="font-size:8.5px;color:#7a9fc0;margin-top:2px">Strength ${s.strength}/100</div></div>
          <span style="font-size:14px;font-weight:700;color:${scCol}">${s.pressureScore||50}</span>
        </div>`;
      });
      html += '</div>';
    }
  }
  el.innerHTML = html;
}

// ─── RENDER SCOUT ─────────────────────────────────────────────
function renderScout() {
  const el = document.getElementById('tab-5');
  const top = STATE.scoutResults.slice(0, 20);

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:14px;font-weight:800;color:#dde8f5;letter-spacing:0.1em">🔍 WATCHLIST SCOUT</div>
      <div style="font-size:9.5px;color:#aacde0;margin-top:3px">Scores 30 tickers across: Liquidity · GEX Structure · Premium Quality · Flow Activity</div>
    </div>
    <button class="scan-btn" onclick="runScout()" ${!STATE.connected||STATE.scoutLoading?'disabled':''}>
      ${STATE.scoutLoading?'SCANNING...':STATE.scoutResults.length?'↺ RESCAN':'▶ RUN SCOUT'}
    </button>
  </div>`;

  if (!STATE.connected) {
    html += `<div style="padding:30px;text-align:center;color:#8db4d0;font-size:11px">Connect your Tradier token to run the Watchlist Scout.</div>`;
  } else if (STATE.scoutLoading && !top.length) {
    html += `<div style="padding:30px;text-align:center;color:#38bdf8;font-size:11px">Scanning tickers... this takes about 60 seconds.</div>`;
  } else if (!top.length) {
    html += `<div style="padding:30px;text-align:center;color:#8db4d0;font-size:11px">Click RUN SCOUT to analyze 30 tickers and find the best opportunities right now.</div>`;
  } else {
    // Summary row
    const addRec = top.filter(t=>t.strategy==="SELL PUTS"||t.strategy==="COVERED CALLS").slice(0,5);
    if (addRec.length) {
      html += `<div style="background:#38bdf808;border:1px solid #38bdf822;border-radius:5px;padding:12px;margin-bottom:14px">
        <div style="font-size:10px;font-weight:700;color:#38bdf8;margin-bottom:8px;letter-spacing:0.1em">★ TOP RECOMMENDATIONS RIGHT NOW</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">`;
      addRec.forEach(t => {
        const bbTag = t.blueBar ? `<span style="font-size:8px;color:#38bdf8;background:#38bdf811;padding:1px 5px;border-radius:8px;border:1px solid #38bdf833">🔵 BB</span>` : '';
        html += `<div style="padding:8px 12px;background:#0b1424;border-radius:4px;border:1px solid ${t.stratColor}33;display:flex;align-items:center;gap:8px">
          <div>
            <div style="display:flex;align-items:center;gap:4px">
              <span style="font-size:14px;font-weight:800;color:#dde8f5">${t.ticker}</span>${bbTag}
            </div>
            <div style="font-size:9px;color:${t.stratColor};font-weight:700;margin-top:2px">${t.strategy}</div>
            ${t.putWall?`<div style="font-size:8.5px;color:#aacde0">Put wall $${t.putWall}</div>`:''}
          </div>
          <div style="font-size:20px;font-weight:800;color:${t.score>=70?'#00e5a0':t.score>=55?'#f5c518':'#bdd4e8'}">${t.score}</div>
        </div>`;
      });
      html += `</div></div>`;
    }

    // Full table
    html += `<div style="background:#080f1d;border:1px solid #0f1c30;border-radius:5px;overflow:hidden">
      <div style="display:grid;grid-template-columns:60px 50px 55px 60px 55px 55px 55px 55px 80px 1fr;gap:4px;padding:7px 12px;font-size:8.5px;color:#7a9fc0;border-bottom:1px solid #0f1c30;font-weight:700">
        <span>TICKER</span><span>SCORE</span><span>PRICE</span><span>STRATEGY</span><span>LIQUID</span><span>GEX</span><span>PREM</span><span>FLOW</span><span>PRESSURE</span><span>NOTES</span>
      </div>`;

    top.forEach((t, i) => {
      const scCol = t.score>=70?"#00e5a0":t.score>=55?"#f5c518":"#bdd4e8";
      const psCol = scoreColor(t.ps);
      const chgCol = t.chg>=0?"#00e5a0":"#e8394a";
      const inWatchlist = WATCHLIST.includes(t.ticker);
      const bbBadge = t.blueBar ? '🔵' : '';
      const notes = [];
      if (t.blueBar) notes.push("Blue Bar active");
      if (t.ng > 0 && t.gflip && t.spot > t.gflip) notes.push("Above gamma flip");
      if (t.callWall) notes.push("Call wall $"+t.callWall);
      if (t.putWall) notes.push("Put wall $"+t.putWall);

      const tierColor2 = t.priceTier==="MICRO"?"#e8394a":t.priceTier==="LOW"?"#a78bfa":t.priceTier==="MID"?"#bdd4e8":"#38bdf8";
      html += `<div style="display:grid;grid-template-columns:60px 50px 55px 60px 55px 55px 55px 55px 80px 1fr;gap:4px;padding:6px 12px;border-bottom:1px solid #1a2a3a;font-size:10px;background:${i%2===0?'#07101e':'#080f1d'};${inWatchlist?'border-left:2px solid #38bdf855':''}" title="${t.ticker}">
        <div>
          <span style="font-size:12px;font-weight:700;color:${inWatchlist?'#38bdf8':'#aabbd8'}">${t.ticker}</span>
          ${bbBadge?`<span style="font-size:9px"> ${bbBadge}</span>`:''}
          ${inWatchlist?'<div style="font-size:7.5px;color:#38bdf8aa">★ ON LIST</div>':''}
        </div>
        <span style="font-size:15px;font-weight:800;color:${scCol}">${t.score}</span>
        <div><span style="font-size:10px;font-weight:700;color:#f5c518">$${t.spot.toFixed(0)}</span><div style="font-size:7.5px;color:${tierColor2}">${t.priceTier}</div></div>
        <span style="font-size:9px;font-weight:700;color:${t.stratColor}">${t.strategy}</span>
        <span style="color:#bdd4e8">${t.liqScore}/25</span>
        <span style="color:${t.gexScore>=15?'#00e5a0':t.gexScore>=10?'#f5c518':'#e8394a'}">${t.gexScore}/25</span>
        <span style="color:#bdd4e8">${t.premScore}/25</span>
        <span style="color:${t.flowScore>=15?'#00e5a0':t.flowScore>=10?'#f5c518':'#bdd4e8'}">${t.flowScore}/25</span>
        <div>
          <span style="font-size:11px;font-weight:700;color:${psCol}">${t.ps}</span>
          <span style="font-size:9px;color:${chgCol}"> ${t.chg>=0?'+':''}${t.chg.toFixed(1)}%</span>
        </div>
        <span style="font-size:8.5px;color:#aacde0">${notes.slice(0,2).join(' · ')}</span>
      </div>`;
    });

    if (STATE.scoutLoading) {
      html += `<div style="padding:10px 12px;font-size:9.5px;color:#38bdf8;border-top:1px solid #0f1c30">Scanning more tickers...</div>`;
    }
    html += `</div>
    <div style="font-size:8.5px;color:#7a9fc0;margin-top:8px">★ = currently on your watchlist · 🔵 = Blue Bar signal active · Score out of 100</div>`;
  }
  el.innerHTML = html;
}

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  renderWatchlist();
  renderOverview();
  renderSignals();
  renderScout();
  renderSetupGuide();
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key==='Enter') handleConnect();
  });

  // Auto-connect from saved token
  const saved = localStorage.getItem('shadowtape_token');
  if (saved) {
    document.getElementById('conn-status').innerHTML = '⏳ Auto-connecting...';
    document.getElementById('conn-status').style.color = '#38bdf8';
    try {
      await connectWithToken(saved);
    } catch(e) {
      // Saved token failed — clear it and show panel
      localStorage.removeItem('shadowtape_token');
      document.getElementById('conn-status').textContent = 'NOT CONNECTED';
      document.getElementById('conn-status').style.color = '#7a9fc0';
      setStatus("⚠ Saved token expired — paste your token again.", "#f5c518");
    }
  }
}

init();
</script>
