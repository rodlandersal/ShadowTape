<script>
// ─── STATE ───────────────────────────────────────────────────
let STATE = {
  token: null,
  connected: false,
  loading: false,
  selectedTicker: "SPY",
  selectedExp: null,
  expirations: [],
  quote: null,
  gexStrikes: [],
  pressureScore: 50,
  totalCallPrem: 0,
  totalPutPrem: 0,
  netGEX: 0,
  gammaFlip: null,
  callWall: null,
  putWall: null,
  dpLevels: [],
  watchlistData: {},
  activeTab: 0,
  refreshTimer: null,
};

const WATCHLIST = ["SPY","QQQ","AAPL","MSFT","VZ","WMT","NVDA","PLTR","META","COP","JEPI"];

const TICKER_META = {
  SPY:  {role:"Market Barometer",  tier:"MACRO",  note:"Overall GEX regime"},
  QQQ:  {role:"Tech Barometer",    tier:"MACRO",  note:"Tech sector health"},
  AAPL: {role:"Core Income",       tier:"TIER 1", note:"Best liquidity, weekly opts"},
  MSFT: {role:"Core Income",       tier:"TIER 1", note:"Blue chip, consistent premiums"},
  VZ:   {role:"Income + Dividend", tier:"TIER 1", note:"Range-bound, ~6% yield"},
  WMT:  {role:"Defensive Income",  tier:"TIER 1", note:"Stable, reliable premiums"},
  NVDA: {role:"Growth + Income",   tier:"TIER 2", note:"Fat premiums, AI tailwind"},
  PLTR: {role:"Growth + Income",   tier:"TIER 2", note:"Heavy institutional flow"},
  META: {role:"Growth + Income",   tier:"TIER 2", note:"Strong fundamentals, liquid"},
  COP:  {role:"Energy Diversifier",tier:"TIER 3", note:"Energy + dividend ~4.8%"},
  JEPI: {role:"Base Income ETF",   tier:"TIER 3", note:"Monthly income, 8%+ yield"},
};

const TIER_COLORS = {
  "MACRO":"#f5c518","TIER 1":"#00e5a0","TIER 2":"#38bdf8","TIER 3":"#a78bfa"
};

// API via Cloudflare Worker
const WORKER = "https://shadowtape-proxy.shadowtape-account.workers.dev";

async function tFetch(path) {
  const workerUrl = WORKER + "?token=" + encodeURIComponent(STATE.token) + "&path=" + encodeURIComponent(path);
  const res = await fetch(workerUrl, { signal: AbortSignal.timeout(12000) });
  if (res.status === 401 || res.status === 403) throw new Error("Token rejected — use PRODUCTION token from Tradier Settings → API Access.");
  if (!res.ok) throw new Error("API error " + res.status);
  return res.json();
}

async function apiQuote(sym) {
  const d = await tFetch("/markets/quotes?symbols=" + sym + "&greeks=true");
  const q = d && d.quotes && d.quotes.quote;
  if (!q) throw new Error("No quote returned for " + sym);
  return q;
}

async function apiExpirations(sym) {
  const d = await tFetch("/markets/options/expirations?symbol=" + sym + "&includeAllRoots=false");
  const e = d && d.expirations && d.expirations.date;
  if (!e) return [];
  return Array.isArray(e) ? e : [e];
}

async function apiChain(sym, exp) {
  const d = await tFetch("/markets/options/chains?symbol=" + sym + "&expiration=" + exp + "&greeks=true");
  const o = d && d.options && d.options.option;
  if (!o) return [];
  return Array.isArray(o) ? o : [o];
}

// ─── ANALYTICS ───────────────────────────────────────────────
function computeGEX(chain, spot) {
  const byStrike = {};
  chain.forEach(opt => {
    if (!opt.greeks || !opt.greeks.gamma || !opt.open_interest) return;
    const s = opt.strike;
    if (!byStrike[s]) byStrike[s] = {strike:s,callGEX:0,putGEX:0,callOI:0,putOI:0,callVol:0,putVol:0,callPrem:0,putPrem:0};
    const gex = opt.greeks.gamma * opt.open_interest * 100 * spot * spot;
    const vol = opt.volume || 0;
    const oi = opt.open_interest || 0;
    const prem = vol * (opt.last || opt.bid || 0) * 100;
    if (opt.option_type === "call") {
      byStrike[s].callGEX += gex; byStrike[s].callOI += oi;
      byStrike[s].callVol += vol; byStrike[s].callPrem += prem;
    } else {
      byStrike[s].putGEX += gex; byStrike[s].putOI += oi;
      byStrike[s].putVol += vol; byStrike[s].putPrem += prem;
    }
  });
  return Object.values(byStrike).sort((a,b) => a.strike - b.strike);
}

function gammaFlip(strikes, spot) {
  const near = [...strikes].sort((a,b) => Math.abs(a.strike-spot) - Math.abs(b.strike-spot));
  for (let i = 0; i < near.length-1; i++) {
    const n1 = near[i].callGEX - near[i].putGEX;
    const n2 = near[i+1].callGEX - near[i+1].putGEX;
    if (Math.sign(n1) !== Math.sign(n2)) return ((near[i].strike + near[i+1].strike)/2).toFixed(2);
  }
  return null;
}

function callWall(strikes, spot) {
  const above = strikes.filter(s => s.strike >= spot);
  return above.length ? above.reduce((m,s) => s.callGEX > m.callGEX ? s : m, above[0]) : null;
}

function putWall(strikes, spot) {
  const below = strikes.filter(s => s.strike <= spot);
  return below.length ? below.reduce((m,s) => s.putGEX > m.putGEX ? s : m, below[0]) : null;
}

function netGEX(strikes) {
  return strikes.reduce((sum,s) => sum + s.callGEX - s.putGEX, 0);
}

function pressureScore(strikes, spot, cp, pp) {
  let score = 50;
  const total = cp + pp;
  if (total > 0) score += (cp/total - 0.5) * 70;
  const ng = netGEX(strikes);
  score += Math.tanh(ng/1e10) * 12;
  const flip = gammaFlip(strikes, spot);
  if (flip) score += spot > parseFloat(flip) ? 6 : -6;
  const cVOI = strikes.reduce((s,x)=>s+x.callVol,0) / (strikes.reduce((s,x)=>s+x.callOI,0)+1);
  const pVOI = strikes.reduce((s,x)=>s+x.putVol,0) / (strikes.reduce((s,x)=>s+x.putOI,0)+1);
  score += cVOI - pVOI > 0 ? 8 : -8;
  return Math.min(100, Math.max(0, Math.round(score)));
}

function dpLevels(strikes, spot) {
  return [...strikes]
    .map(s => ({...s, totalOI: s.callOI+s.putOI, totalPrem: s.callPrem+s.putPrem}))
    .sort((a,b) => b.totalOI - a.totalOI)
    .slice(0, 6)
    .map(s => ({
      price: s.strike, totalOI: s.totalOI, totalPrem: s.totalPrem,
      sentiment: s.strike <= spot ? "support" : "resistance",
      note: s.totalOI > 50000 ? "HIGH CONVICTION" : "MODERATE"
    }));
}

// ─── UI HELPERS ───────────────────────────────────────────────
function showTab(i) {
  STATE.activeTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,idx) => {
    b.classList.toggle('active', idx === i);
  });
  for (let t = 0; t < 5; t++) {
    document.getElementById('tab-'+t).style.display = (t === i) ? '' : 'none';
  }
  if (i === 4) renderSetupGuide();
}

function setStatus(msg, color) {
  const el = document.getElementById('status-msg');
  el.style.display = msg ? 'block' : 'none';
  el.style.color = color || '#e8394a';
  el.textContent = msg;
}

function scoreColor(s) { return s >= 65 ? "#00e5a0" : s >= 42 ? "#f5c518" : "#e8394a"; }
function tierColor(t) { return TIER_COLORS[t] || "#5a7090"; }

function fmtM(v) { return "$" + (v/1000000).toFixed(2) + "M"; }
function fmtB(v) { return (v > 0 ? "+" : "") + (v/1e9).toFixed(2) + "B"; }

// ─── CONNECT ─────────────────────────────────────────────────
async function handleConnect() {
  const input = document.getElementById('token-input');
  const tok = input.value.trim();
  if (!tok) { setStatus("⚠ Please paste your Tradier Production token first"); return; }

  setStatus("⏳ Connecting to Tradier...", "#38bdf8");
  document.querySelector('button[onclick="handleConnect()"]').textContent = "CONNECTING...";

  try {
    STATE.token = tok;
    const q = await apiQuote("SPY");
    if (!q || !q.last) throw new Error("Token accepted but no data returned — ensure it is a Production token");

    STATE.connected = true;

    // Hide token panel, show connected status
    document.getElementById('token-panel').style.display = 'none';
    document.getElementById('conn-status').innerHTML = '<span class="dot"></span> &nbsp;CONNECTED · TRADIER PRODUCTION';
    document.getElementById('conn-status').style.color = '#00e5a0';
    document.getElementById('refresh-btn').style.display = 'inline-block';

    setStatus("");
    await loadData("SPY", null);
    loadWatchlistQuotes();

    // Auto-refresh every 60s
    STATE.refreshTimer = setInterval(() => loadData(STATE.selectedTicker, STATE.selectedExp), 60000);

  } catch(e) {
    STATE.token = null;
    const msg = e.message || "Unknown error";
    if (msg.includes("Failed to fetch") || msg.includes("Load failed") || msg.includes("proxies failed")) {
      setStatus("⚠ Network blocked — try opening in Chrome. If using Chrome, check internet connection.");
    } else if (msg.includes("401") || msg.includes("403")) {
      setStatus("⚠ Token rejected — use PRODUCTION token from Tradier Settings → API Access.");
    } else {
      setStatus("⚠ " + msg);
    }
    document.querySelector(`button[onclick="handleConnect()"]`).textContent = "CONNECT →";
  }
}

async function refreshData() {
  if (!STATE.connected) return;
  await loadData(STATE.selectedTicker, STATE.selectedExp);
}

// ─── DATA LOADING ─────────────────────────────────────────────
async function loadData(ticker, exp) {
  if (!STATE.token) return;
  STATE.loading = true;
  document.getElementById('refresh-btn').textContent = "LOADING...";
  const errBanner = document.getElementById('error-banner');
  errBanner.style.display = 'none';

  try {
    STATE.selectedTicker = ticker;
    const q = await apiQuote(ticker);
    STATE.quote = q;
    const spot = parseFloat(q.last);

    let exps = STATE.expirations;
    if (!exps.length || STATE.selectedTicker !== ticker) {
      exps = await apiExpirations(ticker);
      STATE.expirations = exps;
    }

    const useExp = exp || exps[0];
    STATE.selectedExp = useExp;

    const chain = await apiChain(ticker, useExp);
    const strikes = computeGEX(chain, spot);
    STATE.gexStrikes = strikes;

    const cp = strikes.reduce((s,x)=>s+x.callPrem,0);
    const pp = strikes.reduce((s,x)=>s+x.putPrem,0);
    STATE.totalCallPrem = cp;
    STATE.totalPutPrem = pp;
    STATE.gammaFlip = gammaFlip(strikes, spot);
    STATE.callWall = callWall(strikes, spot);
    STATE.putWall = putWall(strikes, spot);
    STATE.netGEX = netGEX(strikes);
    STATE.pressureScore = pressureScore(strikes, spot, cp, pp);
    STATE.dpLevels = dpLevels(strikes, spot);

    renderAll();

  } catch(e) {
    errBanner.style.display = 'block';
    errBanner.textContent = "⚠ " + e.message;
  } finally {
    STATE.loading = false;
    document.getElementById('refresh-btn').textContent = "↺ REFRESH";
  }
}

async function loadWatchlistQuotes() {
  for (const t of WATCHLIST) {
    try {
      const q = await apiQuote(t);
      STATE.watchlistData[t] = { last: q.last, chg: q.change_percentage };
      renderWatchlist();
    } catch(_) {}
  }
}

async function selectTicker(t) {
  if (!STATE.connected) return;
  STATE.expirations = [];
  STATE.selectedExp = null;
  STATE.gexStrikes = [];
  await loadData(t, null);
}

// ─── RENDER ───────────────────────────────────────────────────
function renderAll() {
  renderWatchlist();
  renderTickerHeader();
  renderOverview();
  renderGEXProfile();
  renderVolumeOI();
  renderKeyLevels();
}

function renderWatchlist() {
  const strip = document.getElementById('watchlist-strip');
  let html = '';
  WATCHLIST.forEach(t => {
    const meta = TICKER_META[t];
    const d = STATE.watchlistData[t];
    const tc = meta ? tierColor(meta.tier) : "#5a7090";
    const isSel = t === STATE.selectedTicker;
    const isPos = d ? d.chg >= 0 : true;
    const activeClass = isSel ? ' active' : '';
    const clickable = STATE.connected ? ' clickable' : '';
    html += `<div class="ticker-card${activeClass}${clickable}" onclick="selectTicker('${t}')" style="border-color:${isSel ? tc+'55' : '#0f1c30'};background:${isSel ? tc+'08' : '#080f1d'}">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <span style="font-size:12px;font-weight:700;color:${isSel?'#dde8f5':'#5a7090'}">${t}</span>
        ${meta ? `<span style="font-size:7.5px;color:${tc};font-weight:700">${meta.tier}</span>` : ''}
      </div>
      ${meta ? `<div style="font-size:7.5px;color:#2a3a50;margin-top:1px">${meta.role}</div>` : ''}
      ${d ? `<div style="font-size:10px;color:#8899bb;margin-top:2px">$${parseFloat(d.last).toFixed(2)}</div>
             <div style="font-size:9px;color:${isPos?'#00e5a0':'#e8394a'};margin-top:1px">${isPos?'▲':'▼'} ${Math.abs(d.chg).toFixed(2)}%</div>`
           : `<div style="font-size:9px;color:#1e3050;margin-top:2px">— awaiting</div>`}
      <div class="progress-bar"><div class="progress-fill" style="width:${isSel?'100%':'0%'};background:${tc}"></div></div>
    </div>`;
  });
  // Legend
  html += `<div style="display:flex;gap:10px;margin-left:12px;align-items:center;border-left:1px solid #0f1c30;padding-left:12px;flex-shrink:0">`;
  Object.entries(TIER_COLORS).forEach(([tier,color]) => {
    html += `<div style="display:flex;align-items:center;gap:4px">
      <div style="width:6px;height:6px;border-radius:50%;background:${color}"></div>
      <span style="font-size:8px;color:#2a3a50">${tier}</span>
    </div>`;
  });
  html += '</div>';
  strip.innerHTML = html;
}

function renderTickerHeader() {
  const el = document.getElementById('ticker-header');
  if (!STATE.connected || !STATE.quote) { el.style.display='none'; return; }
  el.style.display = 'flex';
  el.style.flexWrap = 'wrap';
  el.style.gap = '24px';
  el.style.alignItems = 'flex-start';

  const q = STATE.quote;
  const spot = parseFloat(q.last);
  const meta = TICKER_META[STATE.selectedTicker];
  const tc = meta ? tierColor(meta.tier) : "#5a7090";
  const chgColor = q.change_percentage >= 0 ? "#00e5a0" : "#e8394a";
  const sc = STATE.pressureScore;
  const scorecol = scoreColor(sc);
  const ngB = STATE.netGEX/1e9;
  const posture = ngB > 0.3 ? "POSITIVE" : ngB < -0.3 ? "NEGATIVE" : "NEUTRAL";
  const gcol = ngB > 0.3 ? "#00e5a0" : ngB < -0.3 ? "#e8394a" : "#f5c518";

  // Arc SVG
  const r=52, cx=65, cy=68;
  const sa=Math.PI*1.15, ea=Math.PI*1.85;
  const arc=ea-sa;
  const ae=sa+arc*(sc/100);
  const sx=cx+r*Math.cos(sa), sy=cy+r*Math.sin(sa);
  const ex=cx+r*Math.cos(ae), ey=cy+r*Math.sin(ae);
  const bx=cx+r*Math.cos(ea), by=cy+r*Math.sin(ea);
  const la=arc*(sc/100)>Math.PI?1:0;

  // Expiration buttons
  let expBtns = '';
  STATE.expirations.slice(0,6).forEach(exp => {
    const isSel = exp === STATE.selectedExp;
    expBtns += `<button onclick="selectExp('${exp}')" style="padding:2px 8px;font-size:9px;background:${isSel?'#38bdf811':'#0b1424'};border:1px solid ${isSel?'#38bdf844':'#1e3050'};border-radius:2px;color:${isSel?'#38bdf8':'#4a5a7a'}">${exp}</button>`;
  });

  el.innerHTML = `
    <div>
      <div style="font-size:26px;font-weight:800;color:#dde8f5;letter-spacing:0.06em">${STATE.selectedTicker}</div>
      ${meta ? `<div style="display:flex;gap:6px;align-items:center;margin-bottom:2px">
        <span style="font-size:9px;font-weight:700;color:${tc}">${meta.tier}</span>
        <span style="font-size:9px;color:#2a3a50">·</span>

      <div style="background:#080f1d;border:1px solid #0f1c30;border-radius:5px;padding:14px">
        <div style="font-size:10px;font-weight:700;color:#2a3a50;letter-spacing:0.12em;margin-bottom:10px">◆ GEX KEY LEVELS</div>
        ${[
          {label:"Gamma Flip", val:STATE.gammaFlip?"$"+STATE.gammaFlip:"N/A", color:"#f5c518", desc:"Net GEX zero-crossing · Most critical level"},
          {label:"Call Wall", val:STATE.callWall?"$"+STATE.callWall.strike:"N/A", color:"#00e5a0", desc:STATE.callWall?(STATE.callWall.callGEX/1e6).toFixed(0)+"M call GEX":""},
          {label:"Put Wall", val:STATE.putWall?"$"+STATE.putWall.strike:"N/A", color:"#e8394a", desc:STATE.putWall?(STATE.putWall.putGEX/1e6).toFixed(0)+"M put GEX":""},
          {label:"Current Spot", val:spot?"$"+spot.toFixed(2):"—", color:"#f5c518", desc:"Live last trade price"},
        ].map(k=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin-bottom:4px;background:#0b1424;border-radius:3px;border-left:3px solid ${k.color}">
          <div>
            <div style="font-size:9px;color:#2a3a50;letter-spacing:0.1em">${k.label}</div>
            <div style="font-size:9px;color:#4a5a7a;margin-top:1px">${k.desc}</div>
          </div>
          <div style="font-size:16px;font-weight:800;color:${k.color}">${k.val}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
